{% extends 'base.html' %}
{% load static %}

{% block page_title %}
  Create Lead
{% endblock %}

{% block css_files %}
  <link rel="stylesheet" href="{% static 'crm/create-lead.css' %}?v=2" />
{% endblock %}

{% block content %}
  <div class="page container">
    <div class="page-header">
      <div>
        <h1 class="page-title">Create Lead</h1>
        <p class="page-subtitle">Fill in the form to create a new lead</p>
      </div>
    </div>

    <div class="create-wrap">
      <div class="panel create-panel">
        <form method="POST" action="{% url 'create' %}" class="lead-form">
          {% csrf_token %}

          <div class="form-grid">
            <div class="form-group">
              <label>First name</label>
              <input type="text" name="first_name" placeholder="First name" />
            </div>

            <div class="form-group">
              <label>Last name</label>
              <input type="text" name="last_name" placeholder="Last name" />
            </div>

            <div class="form-group">
              <label>Email</label>
              <input type="email" name="email" placeholder="Email" />
            </div>

            <div class="form-group">
              <label>Phone</label>
              <input type="text" name="phone" placeholder="Phone" />
            </div>
          </div>

          <button type="submit" class="btn btn-primary">Create</button>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
